
version: '3.8'

name: laravel-stack

x-env: &env
  MYSQL_DATABASE: ${MYSQL_DATABASE:-laravel}
  MYSQL_USER: ${MYSQL_USER:-laravel}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:-laravel}
  MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-laravel}

networks:
  laravel:
    driver: bridge

volumes:
  mysql_data:
  composer_cache:

services:
  site: # Nginx
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:delegated
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      php:
        condition: service_healthy
      redis:
        condition: service_started
      mysql:
        condition: service_healthy
    networks: [laravel]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/healthz || exit 1"]
      interval: 20s
      timeout: 3s
      retries: 5

  php: # PHP-FPM with required extensions
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.2}
    container_name: php
    restart: unless-stopped
    volumes:
      - ./:/var/www/html:delegated
      - composer_cache:/tmp/composer-cache
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
    networks: [laravel]
    healthcheck:
      test: ["CMD-SHELL", "php -v >/dev/null 2>&1 && php -m | grep -q pdo_mysql"]
      interval: 20s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      <<: *env
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    networks: [laravel]
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    command: [
      "--default-authentication-plugin=mysql_native_password",
      "--character-set-server=utf8mb4",
      "--collation-server=utf8mb4_unicode_ci"
    ]
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 20s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks: [laravel]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 3s
      retries: 5

  composer:
    image: composer:2
    container_name: composer
    depends_on:
      php:
        condition: service_healthy
    volumes:
      - ./:/var/www/html
      - composer_cache:/tmp/composer-cache
    working_dir: /var/www/html
    entrypoint: ["composer", "--ignore-platform-reqs"]
    networks: [laravel]

  npm:
    image: node:20-alpine
    container_name: npm
    volumes:
      - ./:/var/www/html
    ports:
      - "3000:3000" # Vite dev server
      - "5173:5173" # Default Vite port
    working_dir: /var/www/html
    entrypoint: ["npm"]
    networks: [laravel]

  artisan:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.2}
    container_name: artisan
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./:/var/www/html:delegated
    working_dir: /var/www/html
    user: www-data
    entrypoint: ["php", "/var/www/html/artisan"]
    networks: [laravel]

  # Optional: phpMyAdmin for local DB inspection
  phpmyadmin:
    image: phpmyadmin:apache
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ${MYSQL_USER:-laravel}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-laravel}
    depends_on:
      mysql:
        condition: service_healthy
    networks: [laravel]
